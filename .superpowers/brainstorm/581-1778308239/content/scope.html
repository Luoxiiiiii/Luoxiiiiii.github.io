<h2>游戏规模和深度？</h2>
<p class="subtitle">"手机里有多少东西"直接决定了你需要做多少内容</p>

<div class="options">
  <div class="option" data-choice="small" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>轻量版——3-4个核心app</h3>
      <p>只做几个关键界面：<span style="font-weight:600">聊天记录、浏览器、收音机、备忘录</span>。每个app里3-5条关键线索。总游玩时间约<span style="font-weight:600">15-30分钟</span>。适合快速分享给朋友们试玩。</p>
    </div>
  </div>
  <div class="option" data-choice="medium" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>中型——模拟真实手机</h3>
      <p>包含更多app：聊天、浏览器、收音机、备忘录、<span style="font-weight:600">相册、通话记录、邮件、笔记</span>。多个角色对话、支线线索。游玩时间<span style="font-weight:600">45-90分钟</span>。内容需要认真规划。</p>
    </div>
  </div>
  <div class="option" data-choice="large" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>大型——分章节</h3>
      <p>不止一部手机。可能包含<span style="font-weight:600">多天的时间推进</span>、手机会收到新消息、电台内容随时间变化。多章节，游玩时间2小时以上。需要较多投入。</p>
    </div>
  </div>
</div>
