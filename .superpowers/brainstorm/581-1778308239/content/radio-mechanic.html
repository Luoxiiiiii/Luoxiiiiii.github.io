<h2>电台如何呈现？</h2>
<p class="subtitle">在手机界面上，玩家如何"收听"这个神秘电台？</p>

<div class="options">
  <div class="option" data-choice="radio-app" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>手机自带收音机app</h3>
      <p>亲人手机上有个<span style="font-weight:600">收音机app</span>，在特定频段（比如87.9MHz）能收到奇怪内容。玩家可以在app里手动调频，探索不同频段。深夜时段内容会变化。</p>
    </div>
  </div>
  <div class="option" data-choice="streaming" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>网络电台/播客</h3>
      <p>是一个<span style="font-weight:600">来路不明的流媒体链接</span>或隐藏的播客频道，藏在她浏览器书签或某条神秘短信里。内容更像催眠引导音频，每一集都带来新线索。</p>
    </div>
  </div>
  <div class="option" data-choice="mixed-radio" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合——不止一个入口</h3>
      <p>电台的内容<span style="font-weight:600">散落在不同地方</span>——收音机app有片段、浏览器历史里有网页版、某条未知号码发来的语音消息也是……玩家需要拼凑这些碎片才能拼出完整内容。</p>
    </div>
  </div>
</div>
