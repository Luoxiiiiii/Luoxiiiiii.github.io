<h2>你在"窥探"谁？</h2>
<p class="subtitle">这决定了你的手机界面里看到的是谁的数据</p>

<div class="options">
  <div class="option" data-choice="victim-phone" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>你拿到了她的手机</h3>
      <p>你通过某种方式<span style="font-weight:600">获得了亲人的手机</span>，正在翻看她的聊天记录、浏览器历史、备忘录等。界面就是一部真实的二手手机。你用"窥探器"app来交叉检索各平台数据。</p>
    </div>
  </div>
  <div class="option" data-choice="hacker-tool" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>你用黑客工具远程窥探</h3>
      <p>你<span style="font-weight:600">在自己的设备上</span>使用某种窥探/监控软件，远程获取她的数字痕迹。界面更像一个监控面板——数据流、拦截的消息、实时屏幕截图。</p>
    </div>
  </div>
  <div class="option" data-choice="found-device" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>你捡到了/继承了某个特殊设备</h3>
      <p>最初只是想弄明白亲人发生了什么，但逐渐发现这个设备（或app）有<span style="font-weight:600">超出常理的能力</span>——比如能听到奇怪电台、收到神秘消息。它本身就是一个谜。</p>
    </div>
  </div>
</div>
