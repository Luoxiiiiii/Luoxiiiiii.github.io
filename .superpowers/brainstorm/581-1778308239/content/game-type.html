<h2>你想做哪种核心体验？</h2>
<p class="subtitle">这决定了游戏的结构和交互方式</p>

<div class="options">
  <div class="option" data-choice="narrative" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>沉浸叙事型</h3>
      <p>游戏是<span style="font-weight:600">线性故事</span>。玩家按固定顺序浏览网页、聊天记录、电台录音，像一个互动小说。重在氛围和剧情反转。类似《Her Story》《SIMULACRA》等FMV调查游戏。</p>
    </div>
  </div>
  <div class="option" data-choice="open" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>开放拼图型</h3>
      <p>玩家在<span style="font-weight:600">一个模拟桌面/手机界面</span>中自由探索——可以打开多个窗口、搜索、翻聊天记录、调电台频率。没有固定顺序，像真实的数字侦探。类似《Orwell》《Telling Lies》。</p>
    </div>
  </div>
  <div class="option" data-choice="mixed" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合型</h3>
      <p>大部分自由探索，但<span style="font-weight:600">关键节点触发强制性剧情推进</span>（比如电台在特定时间自动开启，或收到神秘消息）。自由感 + 叙事控制兼顾。</p>
    </div>
  </div>
</div>
